<main class="form-signin w-50 m-auto container-xl mt-5 text-center">
    <form #frmLogin="ngForm" (submit)="login(frmLogin)">
      <img class="mb-4" src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo.svg" alt="" width="72" height="57">
      <h1 class="h3 mb-3 fw-normal">Lütfen Giriş Yapınız</h1>
  
      <div class="form-floating">
        <input ngModel name="username" type="text" class="form-control" required>
        <label>Kullanıcı Adı</label>
      </div>
      <div  class="form-floating">
        <input ngModel name="password" type="password" class="form-control" required>
        <label>Şifre</label>
      </div>
  
      <button [disabled]="frmLogin.invalid" class="btn btn-primary w-100 py-2" type="submit">Giriş Yap</button>
      <p class="mt-5 mb-3 text-body-secondary">&copy; 2017–2024</p>
    </form>
  </main>
