<h3 class="mt-2 pb-2 border-bottom border-black">
    {{ title }}
</h3>
<div class="list-group">
    <a *ngFor="let category of categories" routerLink="/urunler/{{category.id}}"
    routerLinkActive="active" 
    class="list-group-item list-group-item-action">{{category.name | uppercase | titlecase}}</a>
</div>
